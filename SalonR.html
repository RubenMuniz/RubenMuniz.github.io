<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salón de los Recuerdos - Pilotos de F1</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 20px;
            width: 100%;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #f39c12;
        }

        .pilots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            justify-items: center;
        }

        .pilot-card {
            background-color: #1c1c1c;
            border-radius: 15px;
            overflow: hidden;
            width: 100%;
            max-width: 250px; /* Adjust card width */
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .pilot-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5);
        }

        .pilot-card img {
            width: 100%;
            height: 180px; /* Adjust image height */
            object-fit: cover;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .pilot-info {
            padding: 10px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pilot-info h3 {
            margin: 0 0 5px 0;
            color: #f39c12;
            font-size: 1.1em; /* Adjust font size */
        }

        .pilot-info p {
            margin: 0;
            color: #a9a9a9;
            font-size: 0.9em; /* Adjust font size */
        }

        .pilot-video {
            display: none;
            width: 100%;
            height: auto;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .show-video {
            display: block;
        }

        @media screen and (max-width: 768px) {
            .pilots-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }

        @media screen and (max-width: 480px) {
            .pilots-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Salón de los Recuerdos - Pilotos de F1</h1>
</header>

<div class="container">
    <div class="pilots-grid">
        <!-- Example of a card for 20 pilots -->
        <div class="pilot-card" onmouseover="showVideo('video1')" onmouseout="hideVideo('video1')">
            <img src="https://via.placeholder.com/300x200" alt="Carrera 1">
            <div class="pilot-info">
                <h3>Carrera 1 - Piloto 1</h3>
                <p>Descripción de la carrera y el piloto 1.</p>
                <video id="video1" class="pilot-video" controls>
                    <source src="videos/carrera1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
        <!-- Repeat the above block for each of the 20 pilots and their races -->
        <div class="pilot-card" onmouseover="showVideo('video2')" onmouseout="hideVideo('video2')">
            <img src="https://via.placeholder.com/300x200" alt="Carrera 2">
            <div class="pilot-info">
                <h3>Carrera 2 - Piloto 2</h3>
                <p>Descripción de la carrera y el piloto 2.</p>
                <video id="video2" class="pilot-video" controls>
                    <source src="videos/carrera2.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
        <!-- Repeat similar blocks for other pilots -->
        <div class="pilot-card" onmouseover="showVideo('video3')" onmouseout="hideVideo('video3')">
            <img src="https://via.placeholder.com/300x200" alt="Carrera 3">
            <div class="pilot-info">
                <h3>Carrera 3 - Piloto 3</h3>
                <p>Descripción de la carrera y el piloto 3.</p>
                <video id="video3" class="pilot-video" controls>
                    <source src="videos/carrera3.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="pilot-card" onmouseover="showVideo('video4')" onmouseout="hideVideo('video3')">
                <img src="https://via.placeholder.com/300x200" alt="Carrera 3">
                <div class="pilot-info">
                    <h3>Carrera 3 - Piloto 3</h3>
                    <p>Descripción de la carrera y el piloto 3.</p>
                    <video id="video4" class="pilot-video" controls>
                        <source src="videos/carrera3.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
        </div>
        <!-- Continue to add pilot cards up to 20 -->
        <!-- ... -->
    </div>
</div>

<script>
    function showVideo(videoId) {
        document.getElementById(videoId).classList.add('show-video');
    }

    function hideVideo(videoId) {
        document.getElementById(videoId).classList.remove('show-video');
    }
</script>

</body>
</html>
